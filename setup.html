<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white">

<h1>Setup</h1>

<input id="user">
<input id="pass" type="password">

<button onclick="go()">Start</button>

<script>
function go(){
 fetch('/api/setup',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 }).then(()=>location="panel.html");
}
</script>

</body>
</html>
