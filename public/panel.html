<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<h1>Hosting Panel</h1>

<input id="servername" placeholder="Server Name">
<select id="game"></select>
<button onclick="create()">Start</button>

<div id="servers"></div>
<textarea id="consoleBox"></textarea>

<script>
const socket = io();

function create(){
 fetch('/api/server/create',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   game:game.value,
   name:servername.value
  })
 });
}

function load(){
 fetch('/api/server/list')
 .then(r=>r.json())
 .then(data=>{
  servers.innerHTML="";
  data.forEach(s=>{
    servers.innerHTML+=`
    <div>
    ${s.name} (${s.game})
    <button onclick="openConsole('${s.id}')">Konsole</button>
    </div>`;
  });
 });
}

function openConsole(id){
 socket.emit('console',id);
 socket.on('log',d=>consoleBox.value+=d);
}

function loadGames(){
 fetch('/api/games')
 .then(r=>r.json())
 .then(data=>{
  game.innerHTML="";
  data.forEach(g=>{
    game.innerHTML+=`<option value="${g.id}">${g.name}</option>`;
  });
 });
}

window.onload=()=>{
 load();
 loadGames();
}
</script>

</body>
</html>
